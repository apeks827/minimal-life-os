<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Life OS</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #212529;
      --text-muted: #6c757d;
      --border: #dee2e6;
      --accent: #0d6efd;
      --accent-hover: #0b5ed7;
      --danger: #dc3545;
      --success: #198754;
      --focus-bg: #fff3cd;
      --completed-bg: #f8f9fa;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      padding: 1rem;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    
    .section-count {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .capture-form {
      display: flex;
      gap: 0.5rem;
    }
    
    .capture-input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
    }
    
    .capture-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.15);
    }
    
    .btn {
      padding: 0.5rem 0.875rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: #e9ecef; color: var(--text); }
    .btn-secondary:hover { background: #dee2e6; }
    .btn-danger { background: transparent; color: var(--danger); }
    .btn-danger:hover { background: rgba(220, 53, 69, 0.1); }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .task-list { list-style: none; }
    
    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .task-item:last-child { border-bottom: none; }
    
    .task-checkbox {
      width: 1.25rem;
      height: 1.25rem;
      cursor: pointer;
      accent-color: var(--accent);
    }
    
    .task-title {
      flex: 1;
      font-size: 0.9375rem;
    }
    
    .task-title.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    
    .task-actions {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    
    .empty-state {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-style: italic;
      padding: 0.5rem 0;
    }
    
    .focus-section {
      background: var(--focus-bg);
      border-color: #ffc107;
    }
    
    .focus-section .section-title { color: #856404; }
    
    .today-section .section-count { color: var(--accent); }
    
    .completed-section {
      background: var(--completed-bg);
      opacity: 0.8;
    }
    
    .completed-section.collapsed .task-list { display: none; }
    
    .collapse-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
    }
    
    .error-banner {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
    }
    
    .error-banner.visible { display: block; }
    
    .loading { opacity: 0.5; pointer-events: none; }
    
    @media (max-width: 600px) {
      .task-actions { flex-direction: column; }
      .btn-sm { font-size: 0.6875rem; }
    }
  </style>
</head>
<body>
  <h1 data-i18n="appTitle">Minimal Life OS</h1>
  
  <div id="error-banner" class="error-banner"></div>
  
  <section class="section capture-section">
    <form id="capture-form" class="capture-form">
      <input 
        type="text" 
        id="capture-input" 
        class="capture-input" 
        data-i18n-placeholder="capturePlaceholder"
        placeholder="What needs to be done?"
        autocomplete="off"
      >
      <button type="submit" class="btn btn-primary" data-i18n="captureBtn">Add</button>
    </form>
  </section>
  
  <section id="focus-section" class="section focus-section" style="display: none;">
    <div class="section-header">
      <span class="section-title" data-i18n="focusTitle">Focus</span>
    </div>
    <ul id="focus-list" class="task-list"></ul>
  </section>
  
  <section id="today-section" class="section today-section">
    <div class="section-header">
      <span class="section-title" data-i18n="todayTitle">Today</span>
      <span id="today-count" class="section-count"></span>
    </div>
    <ul id="today-list" class="task-list"></ul>
    <p id="today-empty" class="empty-state" data-i18n="todayEmpty">No tasks planned for today</p>
  </section>
  
  <section id="inbox-section" class="section">
    <div class="section-header">
      <span class="section-title" data-i18n="inboxTitle">Inbox</span>
      <span id="inbox-count" class="section-count"></span>
    </div>
    <ul id="inbox-list" class="task-list"></ul>
    <p id="inbox-empty" class="empty-state" data-i18n="inboxEmpty">Capture your first task above</p>
  </section>
  
  <section id="later-section" class="section">
    <div class="section-header">
      <span class="section-title" data-i18n="laterTitle">Later</span>
      <span id="later-count" class="section-count"></span>
    </div>
    <ul id="later-list" class="task-list"></ul>
    <p id="later-empty" class="empty-state" data-i18n="laterEmpty">Nothing scheduled for later</p>
  </section>
  
  <section id="completed-section" class="section completed-section collapsed">
    <div class="section-header">
      <span class="section-title" data-i18n="completedTitle">Completed</span>
      <div>
        <span id="completed-count" class="section-count"></span>
        <button id="completed-toggle" class="collapse-toggle" data-i18n="showBtn">Show</button>
      </div>
    </div>
    <ul id="completed-list" class="task-list"></ul>
  </section>

  <script>
    const API_BASE = '/api/v1';
    const TODAY_MAX = 3;
    
    const I18N = {
      en: {
        appTitle: 'Minimal Life OS',
        capturePlaceholder: 'What needs to be done?',
        captureBtn: 'Add',
        focusTitle: 'Focus',
        todayTitle: 'Today',
        inboxTitle: 'Inbox',
        laterTitle: 'Later',
        completedTitle: 'Completed',
        todayEmpty: 'No tasks scheduled for today. Move up to 3 tasks here.',
        inboxEmpty: 'No tasks yet. Add your first task above.',
        laterEmpty: 'Tasks for another day.',
        showBtn: 'Show',
        hideBtn: 'Hide',
        moveToToday: 'To Today',
        moveToLater: 'To Later',
        moveToInbox: 'To Inbox',
        setFocus: 'Focus',
        clearFocus: 'Clear',
        complete: 'Done',
        todayFull: 'Maximum 3 tasks for today.',
        focusOccupied: 'Focus can only have one task',
        todayFullHelper: 'Today is full (3 max). Complete one to add more.'
      },
      ru: {
        appTitle: 'Minimal Life OS',
        capturePlaceholder: 'Что нужно сделать?',
        captureBtn: 'Добавить',
        focusTitle: 'Фокус',
        todayTitle: 'Сегодня',
        inboxTitle: 'Входящие',
        laterTitle: 'Позже',
        completedTitle: 'Выполнено',
        todayEmpty: 'Нет задач на сегодня. Добавьте до 3 задач.',
        inboxEmpty: 'Задач пока нет. Добавьте первую задачу выше.',
        laterEmpty: 'Задачи на другой день.',
        showBtn: 'Показать',
        hideBtn: 'Скрыть',
        moveToToday: 'В сегодня',
        moveToLater: 'В позже',
        moveToInbox: 'Во входящие',
        setFocus: 'Фокус',
        clearFocus: 'Сбросить',
        complete: 'Готово',
        todayFull: 'Максимум 3 задачи на сегодня.',
        focusOccupied: 'В фокусе может быть только одна задача',
        todayFullHelper: 'Сегодня заполнено (максимум 3). Выполните задачу, чтобы добавить ещё.'
      }
    };
    
    let currentLang = 'en';
    let state = null;
    
    function t(key) {
      return I18N[currentLang][key] || key;
    }
    
    function generateId() {
      return 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }
    
    function showError(message) {
      const banner = document.getElementById('error-banner');
      banner.textContent = message;
      banner.classList.add('visible');
      setTimeout(() => banner.classList.remove('visible'), 5000);
    }
    
    async function apiGet() {
      const res = await fetch(`${API_BASE}/task-state`);
      if (!res.ok) throw new Error('Failed to load tasks');
      return res.json();
    }
    
    async function apiPut(newState) {
      const res = await fetch(`${API_BASE}/task-state`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newState)
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || 'Failed to save tasks');
      }
      return res.json();
    }
    
    async function loadState() {
      try {
        state = await apiGet();
        render();
      } catch (e) {
        showError(e.message);
      }
    }
    
    async function saveState() {
      document.body.classList.add('loading');
      try {
        state = await apiPut(state);
        render();
      } catch (e) {
        showError(e.message);
      } finally {
        document.body.classList.remove('loading');
      }
    }
    
    function createTask(title) {
      const task = { id: generateId(), title, completed: false };
      state.inbox.push(task);
      saveState();
    }
    
    function findTask(taskId) {
      const lists = ['inbox', 'today', 'later', 'completed'];
      for (const list of lists) {
        const idx = state[list].findIndex(t => t.id === taskId);
        if (idx !== -1) return { list, index: idx, task: state[list][idx] };
      }
      return null;
    }
    
    function removeTask(taskId) {
      const found = findTask(taskId);
      if (found) {
        state[found.list].splice(found.index, 1);
      }
    }
    
    function moveToToday(taskId) {
      if (state.today.length >= TODAY_MAX) {
        showError(t('todayFull'));
        return false;
      }
      removeTask(taskId);
      const found = findTask(taskId);
      const task = found ? found.task : null;
      if (!task) return false;
      state.today.push(task);
      saveState();
      return true;
    }
    
    function moveToLater(taskId) {
      removeTask(taskId);
      const found = findTask(taskId);
      const task = found ? found.task : null;
      if (!task) return false;
      state.later.push(task);
      saveState();
      return true;
    }
    
    function moveToInbox(taskId) {
      removeTask(taskId);
      const found = findTask(taskId);
      const task = found ? found.task : null;
      if (!task) return false;
      state.inbox.push(task);
      saveState();
      return true;
    }
    
    function setFocus(taskId) {
      if (state.focus) {
        showError(t('focusOccupied'));
        return false;
      }
      removeTask(taskId);
      const found = findTask(taskId);
      const task = found ? found.task : null;
      if (!task) return false;
      state.focus = task;
      saveState();
      return true;
    }
    
    function clearFocus() {
      if (state.focus) {
        const task = state.focus;
        state.focus = null;
        state.today.unshift(task);
        saveState();
      }
    }
    
    function toggleComplete(taskId) {
      const found = findTask(taskId);
      if (!found) return;
      found.task.completed = !found.task.completed;
      if (found.task.completed && found.list !== 'completed') {
        removeTask(taskId);
        state.completed.push(found.task);
      } else if (!found.task.completed && found.list === 'completed') {
        removeTask(taskId);
        state.inbox.push(found.task);
      }
      saveState();
    }
    
    function deleteTask(taskId) {
      removeTask(taskId);
      saveState();
    }
    
    function renderTask(task, context) {
      const li = document.createElement('li');
      li.className = 'task-item';
      li.dataset.id = task.id;
      
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-checkbox';
      checkbox.checked = task.completed;
      checkbox.addEventListener('change', () => toggleComplete(task.id));
      
      const title = document.createElement('span');
      title.className = 'task-title' + (task.completed ? ' completed' : '');
      title.textContent = task.title;
      
      const actions = document.createElement('div');
      actions.className = 'task-actions';
      
      if (context === 'focus') {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'btn btn-secondary btn-sm';
        clearBtn.textContent = t('clearFocus');
        clearBtn.addEventListener('click', clearFocus);
        actions.appendChild(clearBtn);
      } else {
        if (context !== 'today' && state.today.length < TODAY_MAX) {
          const todayBtn = document.createElement('button');
          todayBtn.className = 'btn btn-primary btn-sm';
          todayBtn.textContent = t('moveToToday');
          todayBtn.addEventListener('click', () => moveToToday(task.id));
          actions.appendChild(todayBtn);
        }
        
        if (context !== 'later') {
          const laterBtn = document.createElement('button');
          laterBtn.className = 'btn btn-secondary btn-sm';
          laterBtn.textContent = t('moveToLater');
          laterBtn.addEventListener('click', () => moveToLater(task.id));
          actions.appendChild(laterBtn);
        }
        
        if (context !== 'inbox') {
          const inboxBtn = document.createElement('button');
          inboxBtn.className = 'btn btn-secondary btn-sm';
          inboxBtn.textContent = t('moveToInbox');
          inboxBtn.addEventListener('click', () => moveToInbox(task.id));
          actions.appendChild(inboxBtn);
        }
        
        if (context === 'today' && !state.focus) {
          const focusBtn = document.createElement('button');
          focusBtn.className = 'btn btn-secondary btn-sm';
          focusBtn.textContent = t('setFocus');
          focusBtn.addEventListener('click', () => setFocus(task.id));
          actions.appendChild(focusBtn);
        }
        
        if (!task.completed) {
          const doneBtn = document.createElement('button');
          doneBtn.className = 'btn btn-sm';
          doneBtn.style.color = 'var(--success)';
          doneBtn.textContent = t('complete');
          doneBtn.addEventListener('click', () => toggleComplete(task.id));
          actions.appendChild(doneBtn);
        }
      }
      
      li.appendChild(checkbox);
      li.appendChild(title);
      li.appendChild(actions);
      return li;
    }
    
    function renderSection(listId, emptyId, countId, tasks, context) {
      const list = document.getElementById(listId);
      const empty = document.getElementById(emptyId);
      const count = document.getElementById(countId);
      
      list.innerHTML = '';
      tasks.forEach(task => list.appendChild(renderTask(task, context)));
      
      if (count) count.textContent = tasks.length ? `(${tasks.length})` : '';
      if (empty) empty.style.display = tasks.length ? 'none' : 'block';
    }
    
    function render() {
      if (!state) return;
      
      const focusSection = document.getElementById('focus-section');
      const focusList = document.getElementById('focus-list');
      
      if (state.focus) {
        focusSection.style.display = 'block';
        focusList.innerHTML = '';
        focusList.appendChild(renderTask(state.focus, 'focus'));
      } else {
        focusSection.style.display = 'none';
      }
      
      renderSection('today-list', 'today-empty', 'today-count', state.today, 'today');
      renderSection('inbox-list', 'inbox-empty', 'inbox-count', state.inbox, 'inbox');
      renderSection('later-list', 'later-empty', 'later-count', state.later, 'later');
      renderSection('completed-list', null, 'completed-count', state.completed, 'completed');
    }
    
    document.getElementById('capture-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('capture-input');
      const title = input.value.trim();
      if (title) {
        createTask(title);
        input.value = '';
      }
    });
    
    document.getElementById('completed-toggle').addEventListener('click', () => {
      const section = document.getElementById('completed-section');
      const btn = document.getElementById('completed-toggle');
      section.classList.toggle('collapsed');
      btn.textContent = section.classList.contains('collapsed') ? t('showBtn') : t('hideBtn');
    });
    
    document.addEventListener('DOMContentLoaded', loadState);
  </script>
</body>
</html>
